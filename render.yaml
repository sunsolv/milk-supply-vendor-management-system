services:
  - type: web
    name: milk-supply-vendor-management-system
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: USE_LEGACY_BACKEND
        value: "false"
      - key: VITE_APPS_SCRIPT_API_URL
        value: https://script.google.com/macros/s/AKfycbyVbHS1fUWrNNr-vZsYOwAlGoBgvnC4UF5hildHMOFaiFlXNnI-iyw-_F1VOm91yYa5/exec
